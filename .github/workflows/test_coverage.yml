name: Golden (uv.lock) tests on all OS

on:
  push:
  pull_request:

jobs:
  golden:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      # IMPORTANT: use runner CPython (includes Tcl/Tk on Windows)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install uv (do NOT set python-version here)
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # Lockfile must match pyproject.toml
      - name: Check lockfile consistency
        run: uv lock --check

      # Non-negotiable environment from uv.lock
      - name: Sync (locked, with test deps)
        run: uv sync --locked --extra test

      - name: Run tests
        shell: bash
        run: |
          uv run pytest --junitxml=pytest.xml \
            --cov=pyPLUTO --cov-report=term-missing Tests/ \
            | tee pytest-coverage.txt

      # Post coverage comment only once (avoid 3 PR comments)
      - name: Pytest coverage comment
        if: matrix.os == 'ubuntu-latest'
        id: coverageComment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml

      - name: Create the Badge
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.PYTEST_COVERAGE_COMMENT }}
          gistID: 384b1f3a3a3b74cdbd65c4e3dce0632f
          filename: pytest-coverage-comment__main.json
          label: Coverage
          message: ${{ steps.coverageComment.outputs.coverage }}
          color: ${{ steps.coverageComment.outputs.color }}
          namedLogo: pytest
