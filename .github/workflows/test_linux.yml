name: Linux Tests

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-22.04
          - ubuntu-24.04
        python-version: ["3.12", "3.13", "3.14"]
        sync-args: [null]
        include:
          - os: ubuntu-22.04
            python-version: 3.12.0
            sync-args: --resolution=lowest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clean untracked files & bytecode
        run: git clean -xfd

      # --- Setup Python ---
      - name: Set up Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: ${{ matrix.python-version }}
          prune-cache: false

      # --- Sync ---
      - name: sync env
        run: uv sync --all-extras ${{ matrix.sync-args }}

      # --- Run tests ---
      - name: Run Tests
        run: uv run --no-sync pytest -v ./Tests

