repos:
  # -----------------------------
  # Pre-commit official hooks
  # -----------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-toml
      - id: check-docstring-first
        files: \.py$
      - id: check-added-large-files
        files: \.py$
      - id: check-case-conflict
        files: \.py$
      - id: check-merge-conflict
        files: \.py$
      - id: debug-statements
        files: \.py$
      - id: end-of-file-fixer
        files: \.py$
      - id: mixed-line-ending
        files: \.py$
      - id: trailing-whitespace
        files: \.py$
        args: ["--markdown-linebreak-ext=md"]

  # -----------------------------
  # Auto-walrus
  # -----------------------------
  - repo: https://github.com/MarcoGorelli/auto-walrus
    rev: 0.4.1
    hooks:
      - id: auto-walrus

        
  # -----------------------------
  # Ruff (lint + fix)
  # -----------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Lint first (with autofix)
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

      # Then format
      - id: ruff-format

  # -----------------------------
  # Update uv lock
  # -----------------------------
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.7
    hooks:
      - id: uv-lock
        args: [--check]


  # -----------------------------
  # Check pixi lock
  # ----------------------------- 

  - repo: local
    hooks:
      - id: pixi-lock-check
        name: pixi lock consistency
        entry: bash -c 'PIX="${HOME}/.pixi/bin/pixi"; if command -v pixi >/dev/null 2>&1; then pixi lock --check; elif [ -x "$PIX" ]; then "$PIX" lock --check; else echo "pixi not found (PATH and ${HOME}/.pixi/bin/pixi). Install pixi first."; exit 1; fi'
        language: system
        pass_filenames: false

  # -----------------------------
  # Type checking (pyright)
  # -----------------------------
  # pyright is the standard type checker for PyPLUTO. pyrefly and ty (the
  # `typefuture` dependency group) are kept available but are not run here yet.
  - repo: local
    hooks:
      - id: pyright
        name: pyright type check
        entry: pyright
        language: system
        pass_filenames: false
        stages: [pre-push, manual]

  # -----------------------------
  # Pytest coverage (manual only)
  # -----------------------------
  - repo: local
    hooks:
      - id: pytest
        name: pytest with coverage
        entry: pytest --cov=pyPLUTO --cov-fail-under=45
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false
