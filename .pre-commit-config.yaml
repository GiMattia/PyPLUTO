repos:
  # -----------------------------
  # Pre-commit official hooks
  # -----------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-toml
      - id: check-docstring-first
        files: \.py$
      - id: check-added-large-files
        files: \.py$
      - id: check-case-conflict
        files: \.py$
      - id: check-merge-conflict
        files: \.py$
      - id: debug-statements
        files: \.py$
      - id: end-of-file-fixer
        files: \.py$
      - id: mixed-line-ending
        files: \.py$
      - id: trailing-whitespace
        files: \.py$
        args: ["--markdown-linebreak-ext=md"]

        
  # -----------------------------
  # Ruff (lint + fix)
  # -----------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      # Lint first (with autofix)
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

      # Then format
      - id: ruff-format

  # -----------------------------
  # Type checking (ty)
  # -----------------------------
  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: ty check
        language: system
        pass_filenames: false
        stages: [pre-push, manual]


  # -----------------------------
  # Pytest coverage (manual only)
  # -----------------------------
  - repo: local
    hooks:
      - id: pytest
        name: pytest with coverage
        entry: pytest --cov=pyPLUTO --cov-fail-under=45
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false

  - repo: local
    rev: 6.0.1  # pin a specific version
    hooks:
      - id: radon
        name: radon-complexity
        args:
          [
            "cc",
            "-s",            # show score
            "-a",            # show average
            "--fail-under",
            "B",             # threshold (A best → F worst)
          ]
        stages: [manual]