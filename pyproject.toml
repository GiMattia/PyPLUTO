[build-system]
requires = ["setuptools>=65"]
build-backend = "setuptools.build_meta"

[project]
name = "PyPLUTO"
version = "1.1.1"
description = "PyPLUTO: Plotting routines for PLUTO"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "BSD-3-Clause" }
authors = [
    { name = "G. Mattia", email = "mattia@mpia.de" },
    { name = "D. Crocco" },
    { name = "D. Melon Fuksman" },
    { name = "M. Bugli" },
    { name = "V. Berta" },
    { name = "E. Puzzoni" },
    { name = "A. Mignone" },
    { name = "B. Vaidya" }
]
dependencies = [ 
    "numpy", 
    "matplotlib", 
    "scipy", 
    "numexpr", 
    "pandas", 
    "h5py", 
]

[project.optional-dependencies]
gui = [
    "PySide6"
]

docs = [
    "sphinx",
    "sphinx-automodapi",
    "numpydoc"
]
test = [
    "pytest",
    "pytest-doctestplus",
    "pytest-mock",
    "coverage",
    "pytest-cov",
    "approvaltests"
] 
dev = [
    "black",
    "pre-commit",
    "pylint",
    "ruff",
    "mypy",
    "blacken-docs",
    "interrogate",
    "pydata-sphinx-theme"
]

pasta = [
    "pastamarkers"
]

[tool.setuptools.packages.find]
include = ["pyPLUTO*"]

[project.scripts]
pypluto-gui = "pyPLUTO.gui.main:main"

[tool.black]
line-length = 80

[tool.ruff]
line-length = 80
respect-gitignore = true
fix = true
fix-only = true

[tool.ruff.lint]
select = [
    "E",  # pycodestyle (errors)
    "F",  # pyflakes (logical errors)
    "I",  # isort (import sorting)
    "UP", # pyupgrade (e.g. f-strings for older format)
    "D",  # pydocstyle (docstring conventions)
    "PL", # pylint (careful coding style)
    "B",  # flake8-bugbear (likely bugs and design flaws)
    "A",  # flake8-builtins (avoid shadowing built-ins)
    "C4", # flake8-comprehensions (inefficient comprehensions)
    "SIM",# flake8-simplify (simplify complex logic)
    "PT", # flake8-pytest-style (if you use pytest)
    "RUF",# Ruff-specific rules
    "ANN",# ruff-annotations (type annotations)
]

ignore = [
    "D203",  # Conflicts with D211 (one-blank-line-before-class)
    "D213"   # Conflicts with D212 (summary on first vs second line)
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["D", "PLR2004"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
check_untyped_defs = true
pretty = true

[tool.coverage.run]
source = ["pyPLUTO"]
branch = true

[tool.coverage.report]
omit = [
    "*/Tests/*",
    "*/Docs/*",
    "*/.venv/*",
    "*/site-packages/*"
]
exclude_lines = [
    "pragma: no cover",
    "@overload",
    "if TYPE_CHECKING:",
    "def __repr__",
    "def __str__",
    "raise NotImplementedError"
]

[tool.pylint.main]
py-version = "3.10"
jobs = 1
persistent = true
suggestion-mode = true
exit-zero = true

[tool.pylint.messages_control]
disable = [
#    "missing-docstring",
    "invalid-name",
#    "too-few-public-methods",
#    "too-many-arguments",
#    "too-many-positional-arguments",
#    "too-many-instance-attributes",
#    "duplicate-code",
]

[tool.pylint.format]
max-line-length = 80

[tool.pylint.reports]
output-format = "text"

[tool.ty]
python-version = "3.10"